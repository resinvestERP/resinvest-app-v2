    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .green-gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="pb-20">
    <!-- Header -->
    <header class="green-gradient text-white p-6 rounded-b-3xl shadow-lg mb-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">ResInvest</h1>
                <p class="text-emerald-100 text-sm">Commodities Dashboard</p>
            </div>
            <div class="bg-white/20 p-3 rounded-full">
                <i class="fas fa-chart-line text-xl"></i>
            </div>
        </div>
    </header>

    <main class="px-4 space-y-6">
        <!-- KPI Section -->
        <section class="grid grid-cols-2 gap-4" id="kpi-container">
            <!-- KPIs will be injected here -->
        </section>

        <!-- Charts Section -->
        <section class="card p-4">
            <h2 class="text-lg font-semibold mb-4 text-emerald-800">Status Magazynów (MP)</h2>
            <canvas id="warehouseChart"></canvas>
        </section>

        <!-- Transport Section -->
        <section class="card p-4">
            <h2 class="text-lg font-semibold mb-4 text-emerald-800">Koszty Transportu</h2>
            <div id="transport-list" class="space-y-3">
                <!-- Transport items will be injected here -->
            </div>
        </section>

        <!-- Recent Transactions -->
        <section class="card p-4 overflow-hidden">
            <h2 class="text-lg font-semibold mb-4 text-emerald-800">Ostatnie Operacje</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b text-gray-500">
                            <th class="pb-2">Data</th>
                            <th class="pb-2">Produkt</th>
                            <th class="pb-2 text-right">Ilość</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body">
                        <!-- Transactions will be injected here -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-4 shadow-2xl">
        <button class="text-emerald-600 flex flex-col items-center">
            <i class="fas fa-home text-xl"></i>
            <span class="text-xs mt-1">Główna</span>
        </button>
        <button class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-warehouse text-xl"></i>
            <span class="text-xs mt-1">Magazyny</span>
        </button>
        <button class="text-gray-400 flex flex-col items-center">
            <i class="fas fa-truck text-xl"></i>
            <span class="text-xs mt-1">Logistyka</span>
        </button>
    </nav>

        const kpiContainer = document.getElementById('kpi-container');
        const kpis = [
            { label: 'Wolumen (MP)', value: appData.kpi.total_volume_mp, icon: 'fa-box', color: 'text-emerald-600' },
            { label: 'Sprzedaż (PLN)', value: appData.kpi.total_value_sales, icon: 'fa-coins', color: 'text-blue-600' },
            { label: 'Transport (PLN)', value: appData.kpi.total_transport_cost, icon: 'fa-truck', color: 'text-orange-600' },
            { label: 'Operacje', value: appData.kpi.transaction_count, icon: 'fa-sync', color: 'text-purple-600' }
        ];

        kpis.forEach(kpi => {
            kpiContainer.innerHTML += `
                <div class="card p-4 flex flex-col items-center justify-center text-center">
                    <i class="fas ${kpi.icon} ${kpi.color} mb-2 text-xl"></i>
                    <span class="text-2xl font-bold text-gray-800">${kpi.value}</span>
                    <span class="text-xs text-gray-500 uppercase tracking-wider">${kpi.label}</span>
                </div>
            `;
        });

        // Warehouse Chart
        const ctx = document.getElementById('warehouseChart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: appData.warehouses.map(w => w.name),
                datasets: [{
                    label: 'Ilość MP',
                    data: appData.warehouses.map(w => w.mp),
                    backgroundColor: '#10b981',
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // Transport List
        const transportList = document.getElementById('transport-list');
        appData.transport.forEach(item => {
            if (item.koszt > 0) {
                transportList.innerHTML += `
                    <div class="flex justify-between items-center p-3 bg-emerald-50 rounded-lg">
                        <div class="flex items-center">
                            <div class="bg-emerald-100 p-2 rounded-lg mr-3">

                            </div>
                            <div>

                                <p class="text-xs text-gray-500">${item.kursy} kursy | ${item.tony} t</p>
                            </div>
                        </div>
                        <span class="font-bold text-emerald-700">${item.koszt} PLN</span>
                    </div>
                `;
            }
        });

        // Transactions Table

        appData.transactions.forEach(t => {
            const date = t['Data dostawy'] ? t['Data dostawy'].split('T')[0] : '---';
            const typeColor = t['Zakup/Sprzedaż'] === 'SPRZEDAŻ' ? 'text-emerald-600' : 'text-blue-600';
            transBody.innerHTML += `

                    <td class="py-3 text-gray-600 text-xs">${date}</td>
                    <td class="py-3">

                        <p class="text-[10px] ${typeColor} font-bold uppercase">${t['Zakup/Sprzedaż']}</p>
                    </td>

</html>
